name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: modempic
          POSTGRES_PASSWORD: modempiclocal
          POSTGRES_DB: modempic
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U modempic -d modempic"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: web

    env:
      DATABASE_URL: postgresql://modempic:modempiclocal@localhost:5432/modempic
      AUTH_SECRET: ci-auth-secret-ci-auth-secret-ci-auth-secret
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      AUTH_URL: http://localhost:3000
      DEV_PAYMENT_SIMULATE: "1"
      CRYPTO_WEBHOOK_SECRET: ci-crypto-webhook-secret
      SEED_ADMIN_PASSWORD: ModempicCi2026!

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run db:validate

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: E2E smoke tests
        run: npm run test:e2e
